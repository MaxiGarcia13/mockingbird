name: Build & Lint & Test

on:
  workflow_call:

jobs:
  build-lint-test:
    name: Build & Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm run test:unit
